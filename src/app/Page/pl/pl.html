<div class="container-fluid">

  <!-- Balance -->
  <div class="balance-card">

    <div>Balance: {{ balance()?.balance }}</div>
    <div>Liability: {{ balance()?.liability }}</div>

  </div>

  <!-- Filters -->
  <div class="row mt-3"> 

    <div class="col-md-3">
      <mat-form-field appearance="outline">
        <mat-label>Start Date</mat-label>

        <input matInput
               [matDatepicker]="picker1"
               [(ngModel)]="fromDate">

        <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>

        <mat-datepicker #picker1></mat-datepicker>
      </mat-form-field>
    </div>

    <div class="col-md-3">
      <mat-form-field appearance="outline">
        <mat-label>End Date</mat-label>

        <input matInput
               [matDatepicker]="picker2"
               [(ngModel)]="toDate">

        <mat-datepicker-toggle matIconSuffix [for]="picker2"></mat-datepicker-toggle>

        <mat-datepicker #picker2></mat-datepicker>
      </mat-form-field>
    </div>

  </div>

  <!-- Checkboxes -->
  <div class="row">

    <div class="col-md-2">
      <mat-checkbox [(ngModel)]="chkSession">
        By Session
      </mat-checkbox>
    </div>

    <div class="col-md-2">
      <mat-checkbox [(ngModel)]="chkFancy">
        Fancy Only
      </mat-checkbox>
    </div>

    <div class="col-md-2">
      <mat-checkbox [(ngModel)]="chkByMarket">
        By Market
      </mat-checkbox>
    </div>

    <div class="col-md-2">
      <mat-checkbox [(ngModel)]="chkByMarketCricket">
        Cricket
      </mat-checkbox>
    </div>

    <div class="col-md-2">
      <button mat-raised-button
              color="primary"
              (click)="loadReport()">

        Load Report
      </button>
    </div>

  </div>

  <!-- Table -->
  <div class="table-responsive mt-4">

    <table class="table table-bordered">

      <thead>
        <tr>
          <!-- <th>Date</th> -->
          <th>Market</th>
          <!-- <th>Selection</th> -->
          <th>Profit/Loss</th>
        </tr>
      </thead>

      <tbody>

        @for(item of reports(); track item.id){

          <tr>

            <!-- <td>{{ item.date }}</td> -->
            <td>{{ item.eventType }}</td>
            <!-- <td>{{ item.selection }}</td> -->

            <td [class.text-success]="item.netProfitandLoss > 0"
                [class.text-danger]="item.netProfitandLoss < 0">

              {{ item.netProfitandLoss }}

            </td>

          </tr>

        }

      </tbody>

    </table>

  </div>

</div>
